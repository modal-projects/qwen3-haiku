<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen3-Haiku — RL-trained haiku generation on Modal</title>
    <meta name="description" content="Compare haiku generation across RL training checkpoints. A Qwen3-4B model fine-tuned with GRPO on Modal to write perfect 5-7-5 haikus.">
    <meta name="keywords" content="haiku, AI haiku generator, reinforcement learning, GRPO, Qwen3, Modal, LLM fine-tuning, poetry generation">
    <link rel="canonical" href="https://haiku.modal.dev/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Qwen3-Haiku — RL-trained haiku generation on Modal">
    <meta property="og:description" content="Compare haiku generation across RL training checkpoints. Qwen3-4B fine-tuned with GRPO to write perfect 5-7-5 haikus.">
    <meta property="og:url" content="https://haiku.modal.dev/">
    <meta property="og:image" content="https://haiku.modal.dev/assets/haiku_flower.png">
    <meta property="og:site_name" content="Qwen3-Haiku">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Qwen3-Haiku — RL-trained haiku generation on Modal">
    <meta name="twitter:description" content="Compare haiku generation across RL training checkpoints. Qwen3-4B fine-tuned with GRPO on Modal.">
    <meta name="twitter:image" content="https://haiku.modal.dev/assets/haiku_flower.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0f0a;
            --surface: #131a13;
            --surface2: #1a231a;
            --border: #2a3a2a;
            --border-light: #3a4f3a;
            --green: #4ade80;
            --green-dim: #22c55e;
            --green-muted: #16a34a;
            --green-glow: rgba(74, 222, 128, 0.15);
            --green-glow-strong: rgba(74, 222, 128, 0.25);
            --text: #e8efe8;
            --text-dim: #8a9b8a;
            --text-muted: #5a6b5a;
            --red: #f87171;
            --yellow: #fbbf24;
            --diff-add-bg: rgba(74, 222, 128, 0.16);
            --diff-add-fg: rgba(222, 252, 232, 0.92);
            --diff-del-bg: rgba(248, 113, 113, 0.13);
            --diff-del-fg: rgba(248, 113, 113, 0.6);
            --diff-neutral-fg: rgba(232, 239, 232, 0.68);
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 5rem 2rem 2rem;
            overflow: hidden;
        }

        body.scrollable { overflow: auto; }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            min-height: calc(100vh - 7rem);
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: justify-content 0s;
        }

        .container.top-aligned {
            justify-content: flex-start;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: baseline;
            gap: 1rem;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 15, 10, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 5;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--green);
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: 'DM Mono', monospace;
        }

        .input-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .input-row {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        #prompt-input {
            flex: 1;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        #prompt-input::placeholder { color: var(--text-muted); }
        #prompt-input:focus { border-color: var(--green-dim); }

        #submit-btn {
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--green-muted);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.15s;
            white-space: nowrap;
        }

        #submit-btn:hover:not(:disabled) { background: var(--green-dim); }
        #submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.75rem;
        }

        .quick-prompt {
            padding: 0.35rem 0.75rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'DM Mono', monospace;
        }

        .quick-prompt:hover {
            background: var(--green-glow);
            border-color: var(--green-dim);
            color: var(--green);
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--green-dim);
            cursor: pointer;
        }

        .checkbox-row label {
            font-size: 0.85rem;
            cursor: pointer;
            user-select: none;
            color: var(--text-dim);
        }

        .vocab-hint {
            margin-top: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--green-glow);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 0.82rem;
            color: var(--text-dim);
            font-family: 'DM Mono', monospace;
        }

        .vocab-hint strong { color: var(--green); }
        .vocab-hint em { color: var(--text); font-style: normal; }
        .vocab-hint.hidden { display: none; }

        .results-area { width: 100%; }
        .results-area.hidden { display: none; }

        /* ── Card view (iter 50 only) ── */
        .cards-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.75rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.15rem;
            transition: border-color 0.2s, opacity 0.3s, transform 0.3s;
        }

        .card:hover { border-color: var(--border-light); }
        .card.loading { opacity: 0.7; }
        .card.error { border-color: var(--red); }

        .card.card-enter {
            opacity: 0;
            transform: translateY(12px);
        }

        .card.card-enter-active {
            opacity: 1;
            transform: translateY(0);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
        }

        .card-header .model-name { font-size: 0.85rem; }

        .card .haiku-response {
            font-size: 0.82rem;
            line-height: 1.7;
            min-height: 56px;
        }

        .card .haiku-response.placeholder {
            font-size: 0.75rem;
            min-height: 56px;
        }

        .card .cell-meta { margin-top: 0.4rem; }
        .card .score-info { font-size: 0.7rem; }
        .card .syllable-counts { font-size: 0.6rem; }
        .card .latency { font-size: 0.6rem; opacity: 0; }
        .card:hover .latency { opacity: 1; }

        .view-toggle-row {
            display: flex;
            justify-content: center;
            margin: 1.25rem 0;
        }

        .view-toggle-btn {
            padding: 0.45rem 1.1rem;
            font-size: 0.78rem;
            font-family: 'DM Mono', monospace;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s;
        }

        .view-toggle-btn:hover {
            background: var(--green-glow);
            border-color: var(--green-dim);
            color: var(--green);
        }

        /* ── Table (detail) view ── */
        .detail-view { overflow-x: auto; }
        .detail-view.hidden { display: none; }

        .results-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0.25rem;
        }

        .results-table th {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0.4rem 0.5rem;
            text-align: center;
            white-space: nowrap;
        }

        .results-table th.model-col {
            text-align: left;
            width: 88px;
            min-width: 88px;
            max-width: 96px;
            white-space: normal;
        }

        .iter-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-muted);
            text-align: center;
        }

        .row-label {
            vertical-align: top;
            padding: 0.5rem;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .row-label .model-name {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .row-label .model-badge {
            font-size: 0.55rem;
            padding: 0.12rem 0.4rem;
        }

        #detail-view .row-label .model-name {
            font-size: 0.8rem;
            line-height: 1.2;
        }

        #detail-view .haiku-response {
            font-size: 0.72rem;
            line-height: 1.62;
        }

        #detail-view .haiku-response.placeholder {
            font-size: 0.68rem;
        }

        #detail-view .score-info {
            font-size: 0.62rem;
        }

        #detail-view .syllable-counts,
        #detail-view .latency {
            font-size: 0.56rem;
        }

        .prompt-flash {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }

        .prompt-flash-text {
            font-family: 'DM Mono', monospace;
            font-size: clamp(1.2rem, 3vw, 2.2rem);
            color: var(--green);
            text-align: center;
            max-width: 80vw;
            animation: promptZoomFade 1.2s ease-out forwards;
            text-shadow: 0 0 40px rgba(74, 222, 128, 0.4);
        }

        @keyframes promptZoomFade {
            0%   { opacity: 0; transform: scale(0.6); }
            30%  { opacity: 1; transform: scale(1); }
            70%  { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0; transform: scale(1.3); }
        }

        .model-cell {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.45rem 0.55rem;
            transition: border-color 0.2s, opacity 0.3s, transform 0.3s;
            position: relative;
            min-height: 60px;
        }

        .model-cell.card-enter {
            opacity: 0;
            transform: translateY(12px);
        }

        .model-cell.card-enter-active {
            opacity: 1;
            transform: translateY(0);
        }

        .model-cell:hover { border-color: var(--border-light); }
        #detail-view .model-cell[data-model-name] { cursor: pointer; }
        #detail-view .model-cell.diff-baseline-active {
            border-color: var(--green-dim);
            box-shadow:
                0 0 0 1px rgba(74, 222, 128, 0.35),
                0 0 18px rgba(74, 222, 128, 0.22);
            background: rgba(74, 222, 128, 0.06);
        }
        #detail-view .model-cell.diff-axis-active {
            border-color: rgba(74, 222, 128, 0.45);
            background: rgba(74, 222, 128, 0.04);
        }
        #detail-view .row-label.diff-axis-active,
        #detail-view th.diff-axis-active {
            color: var(--green);
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.18);
            background: rgba(74, 222, 128, 0.08);
            border-radius: 6px;
        }
        .model-cell.loading { opacity: 0.7; }
        .model-cell.error { border-color: var(--red); }

        .model-cell.iter-final {
            border-color: var(--green-muted);
            background: rgba(74, 222, 128, 0.04);
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.08);
        }

        .model-name {
            font-weight: 600;
            color: var(--text);
            font-size: 0.8rem;
        }

        .model-badge {
            padding: 0.15rem 0.45rem;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 600;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .badge-base {
            background: var(--surface2);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .badge-trained {
            background: rgba(74, 222, 128, 0.1);
            color: var(--green);
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .badge-final {
            background: rgba(74, 222, 128, 0.2);
            color: var(--green);
            border: 1px solid var(--green-dim);
        }

        .haiku-response {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            line-height: 1.55;
            color: var(--text);
            white-space: pre-wrap;
            min-height: 36px;
        }

        .haiku-response.placeholder {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.6rem;
            min-height: 36px;
        }

        .haiku-response .diff-neutral-dim {
            color: var(--diff-neutral-fg);
        }

        .haiku-response .diff-shared {
            background: var(--diff-add-bg);
            color: var(--diff-add-fg);
            border-radius: 2px;
        }

        .haiku-response .diff-muted {
            color: var(--text-dim);
        }

        .loading-spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 1.5px solid var(--border);
            border-top: 1.5px solid var(--green);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 0.3rem;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .cell-meta {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-top: 0.25rem;
            font-family: 'DM Mono', monospace;
        }

        .score-info {
            font-size: 0.58rem;
            color: var(--text-dim);
        }

        .score-info .pass { color: var(--green); font-weight: 600; }
        .score-info .fail { color: var(--red); font-weight: 600; }

        .syllable-counts {
            font-size: 0.5rem;
            color: var(--text-muted);
        }

        .latency {
            font-size: 0.5rem;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.15s;
            margin-left: auto;
        }

        .model-cell:hover .latency { opacity: 1; }

        .results-table th.iter-final-col {
            color: var(--green);
        }

        #tree-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0.7;
            pointer-events: auto;
            touch-action: none;
            cursor: grab;
            z-index: 0;
            transition: opacity 1.4s ease;
        }

        #tree-canvas.shrunk {
            opacity: 0.35;
        }

        .container { position: relative; z-index: 1; }

        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: petalFloat linear forwards;
        }

        @keyframes petalFloat {
            0%   { opacity: 0; transform: translate(0, 0) rotate(0deg) scale(0.7); }
            10%  { opacity: 0.7; }
            90%  { opacity: 0.7; }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(1); }
        }

        .site-footer {
            position: fixed;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.7rem;
            font-family: 'DM Mono', monospace;
            color: var(--text-muted);
            opacity: 0.5;
            z-index: 2;
        }

        .site-footer a {
            color: var(--green-dim);
            text-decoration: none;
        }

        .site-footer a:hover { opacity: 0.8; }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            header { flex-direction: column; gap: 0.25rem; }
            .input-row { flex-direction: column; }
            #submit-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <canvas id="tree-canvas"></canvas>
    <header>
        <h1>haiku playground</h1>
        <p class="subtitle">compare haiku generation across training checkpoints</p>
    </header>
    <footer class="site-footer">fine-tuned with <a href="https://modal.com" target="_blank">Modal</a></footer>
    <div class="container">
        <div class="input-section">
            <div class="input-row">
                <input type="text" id="prompt-input" placeholder="Write me a haiku about..." value="Write me a haiku about the moon.">
                <button id="submit-btn" onclick="generateHaikus()">Generate</button>
            </div>
            <div class="quick-prompts" id="quick-prompts"></div>
            <div class="checkbox-row">
                <input type="checkbox" id="shill-modal" checked onchange="toggleVocabHint()">
                <label for="shill-modal">Shill Modal — include Modal vocabulary in system prompt</label>
            </div>
            <div class="vocab-hint" id="vocab-hint">
                <strong>bonus words:</strong> try to get the model to use: <em id="vocab-list">loading...</em>
            </div>
        </div>

        <div class="results-area hidden" id="results-area">
            <div class="cards-view" id="cards-view"></div>
            <div class="view-toggle-row" id="toggle-row">
                <button class="view-toggle-btn" id="view-toggle-btn" onclick="toggleDetailView()">compare across checkpoints ↓</button>
            </div>
            <div class="detail-view hidden" id="detail-view"></div>
        </div>
    </div>

    <script src="/haiku_tree.js"></script>
    <script>
        let MODELS = [];
        let VOCABS = [];
        let ITER_NUMS = [];
        let LAST_ITER = '';
        let firstGeneration = true;
        let detailViewShown = false;
        let lastPrompt = '';
        const CELL_TEXTS = new Map();
        let activeDetailDiffCellId = null;

        async function loadConfig() {
            const [modelsResp, vocabsResp, itersResp] = await Promise.all([
                fetch('/api/models'),
                fetch('/api/vocabs'),
                fetch('/api/iter_nums'),
            ]);
            MODELS = await modelsResp.json();
            VOCABS = await vocabsResp.json();
            ITER_NUMS = await itersResp.json();
            LAST_ITER = ITER_NUMS[ITER_NUMS.length - 1];

            const qp = document.getElementById('quick-prompts');
            const prompts = [
                {l:'cat',p:'Write me a haiku about cat.'},
                {l:'ocean',p:'Write me a haiku about the ocean.'},
                {l:'cherry blossoms',p:'Write me a haiku about cherry blossoms.'},
                {l:'coding',p:'Write me a haiku about coding.'},
                {l:'Modal',p:'Write me a haiku about Modal.'},
                {l:'serverless',p:'Write me a haiku about serverless.'},
            ];
            qp.innerHTML = prompts.map(q =>
                `<span class="quick-prompt" onclick="setPrompt('${q.p}')">${q.l}</span>`
            ).join('');

            document.getElementById('vocab-list').textContent = VOCABS.join(', ');
            initCards();
            initDetailTable();
        }

        function toggleVocabHint() {
            const cb = document.getElementById('shill-modal');
            document.getElementById('vocab-hint').classList.toggle('hidden', !cb.checked);
        }

        function setPrompt(t) { document.getElementById('prompt-input').value = t; }

        function cid(prefix, modelName, iterNum) { return `${prefix}-${modelName}--${iterNum}`; }

        function escapeHtml(text) {
            return text
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function tokenizeForDiff(text) {
            return text.split(/(\s+)/).filter(Boolean);
        }

        function lcsTable(baseTokens, targetTokens) {
            const rows = baseTokens.length + 1;
            const cols = targetTokens.length + 1;
            const table = Array.from({ length: rows }, () => Array(cols).fill(0));
            for (let i = 1; i < rows; i++) {
                for (let j = 1; j < cols; j++) {
                    if (baseTokens[i - 1] === targetTokens[j - 1]) {
                        table[i][j] = table[i - 1][j - 1] + 1;
                    } else {
                        table[i][j] = Math.max(table[i - 1][j], table[i][j - 1]);
                    }
                }
            }
            return table;
        }

        function diffTokens(baseTokens, targetTokens) {
            const table = lcsTable(baseTokens, targetTokens);
            const ops = [];
            let i = baseTokens.length;
            let j = targetTokens.length;

            while (i > 0 && j > 0) {
                if (baseTokens[i - 1] === targetTokens[j - 1]) {
                    ops.push({ type: 'equal', token: targetTokens[j - 1] });
                    i--;
                    j--;
                    continue;
                }
                if (table[i][j - 1] >= table[i - 1][j]) {
                    ops.push({ type: 'add', token: targetTokens[j - 1] });
                    j--;
                } else {
                    ops.push({ type: 'del', token: baseTokens[i - 1] });
                    i--;
                }
            }

            while (j > 0) {
                ops.push({ type: 'add', token: targetTokens[j - 1] });
                j--;
            }
            while (i > 0) {
                ops.push({ type: 'del', token: baseTokens[i - 1] });
                i--;
            }

            ops.reverse();
            return ops;
        }

        function sharedTokenIndexes(baseTokens, targetTokens) {
            const table = lcsTable(baseTokens, targetTokens);
            const sharedIndexes = new Set();
            let i = baseTokens.length;
            let j = targetTokens.length;

            while (i > 0 && j > 0) {
                if (baseTokens[i - 1] === targetTokens[j - 1]) {
                    sharedIndexes.add(j - 1);
                    i--;
                    j--;
                    continue;
                }
                if (table[i][j - 1] >= table[i - 1][j]) {
                    j--;
                } else {
                    i--;
                }
            }
            return sharedIndexes;
        }

        function renderWordDiffHtml(baseText, targetText) {
            const targetTokens = tokenizeForDiff(targetText);
            const sharedIndexes = sharedTokenIndexes(tokenizeForDiff(baseText), targetTokens);
            return targetTokens.map((token, idx) => {
                const escaped = escapeHtml(token);
                if (/^\s+$/.test(token)) {
                    return escaped;
                }
                if (sharedIndexes.has(idx)) {
                    return `<span class="diff-shared">${escaped}</span>`;
                }
                return `<span class="diff-muted">${escaped}</span>`;
            }).join('');
        }

        function getDetailRowCells(modelName) {
            return Array.from(document.querySelectorAll('#detail-view .model-cell[data-model-name]'))
                .filter(cell => cell.dataset.modelName === modelName);
        }

        function getDetailColumnCells(iterNum) {
            return Array.from(document.querySelectorAll('#detail-view .model-cell[data-iter-num]'))
                .filter(cell => cell.dataset.iterNum === iterNum);
        }

        function restoreCellText(cell) {
            const cellId = cell.dataset.cellId;
            if (!cellId) return;
            const res = cell.querySelector('.haiku-response');
            if (!res || res.classList.contains('placeholder')) return;
            if (cell.classList.contains('loading') || cell.classList.contains('error')) return;
            const text = CELL_TEXTS.get(cellId);
            if (typeof text !== 'string') return;
            res.textContent = text;
        }

        function clearDetailDiff() {
            const allCells = document.querySelectorAll('#detail-view .model-cell[data-cell-id]');
            allCells.forEach(restoreCellText);
            allCells.forEach(cell => cell.classList.remove('diff-baseline-active'));
            allCells.forEach(cell => cell.classList.remove('diff-axis-active'));
            document.querySelectorAll('#detail-view .row-label.diff-axis-active')
                .forEach(el => el.classList.remove('diff-axis-active'));
            document.querySelectorAll('#detail-view th.diff-axis-active')
                .forEach(el => el.classList.remove('diff-axis-active'));
            activeDetailDiffCellId = null;
        }

        function applyDetailDiffFromCell(cell) {
            if (!cell) return;
            if (cell.classList.contains('loading') || cell.classList.contains('error')) return;
            const modelName = cell.dataset.modelName;
            const iterNum = cell.dataset.iterNum;
            const baselineCellId = cell.dataset.cellId;
            if (!modelName || !iterNum || !baselineCellId) return;

            const baselineText = CELL_TEXTS.get(baselineCellId);
            if (typeof baselineText !== 'string') return;

            clearDetailDiff();
            cell.classList.add('diff-baseline-active');

            const rowCells = getDetailRowCells(modelName);
            const colCells = getDetailColumnCells(iterNum);
            const targets = new Set([...rowCells, ...colCells]);
            rowCells.forEach(rowCell => rowCell.classList.add('diff-axis-active'));
            colCells.forEach(colCell => colCell.classList.add('diff-axis-active'));
            document.querySelectorAll(`#detail-view .row-label[data-model-name="${modelName}"]`)
                .forEach(el => el.classList.add('diff-axis-active'));
            document.querySelectorAll(`#detail-view th[data-iter-num="${iterNum}"]`)
                .forEach(el => el.classList.add('diff-axis-active'));

            for (const targetCell of targets) {
                if (targetCell.classList.contains('loading') || targetCell.classList.contains('error')) continue;
                const targetCellId = targetCell.dataset.cellId;
                if (!targetCellId) continue;
                const targetText = CELL_TEXTS.get(targetCellId);
                if (typeof targetText !== 'string') continue;
                const res = targetCell.querySelector('.haiku-response');
                if (!res || res.classList.contains('placeholder')) continue;
                res.innerHTML = renderWordDiffHtml(baselineText, targetText);
            }

            activeDetailDiffCellId = baselineCellId;
        }

        function bindDetailDiffHover() {
            const cells = document.querySelectorAll('#detail-view .model-cell[data-model-name]');
            cells.forEach(cell => {
                cell.addEventListener('mouseenter', () => {
                    if (activeDetailDiffCellId === cell.dataset.cellId) return;
                    applyDetailDiffFromCell(cell);
                });
                cell.addEventListener('mouseleave', () => clearDetailDiff());
            });
        }

        // ── Card view (iter 50 / base only) ──

        function initCards() {
            const view = document.getElementById('cards-view');
            view.innerHTML = MODELS.map(m => {
                const iter = m.badge === 'base' ? 'base' : LAST_ITER;
                const id = cid('card', m.name, iter);
                return `<div class="card" id="cell-${id}">
                    <div class="card-header">
                        <span class="model-name">${m.label}</span>
                        <span class="model-badge badge-${m.badge}">${m.badge}</span>
                    </div>
                    <div class="haiku-response placeholder" id="res-${id}">—</div>
                    <div class="cell-meta">
                        <span class="score-info" id="score-${id}"></span>
                        <span class="syllable-counts" id="syl-${id}"></span>
                        <span class="latency" id="lat-${id}"></span>
                    </div>
                </div>`;
            }).join('');
        }

        // ── Detail table (all iters) ──

        function initDetailTable() {
            const view = document.getElementById('detail-view');
            const headerCells = `<th class="model-col">model</th>` +
                ITER_NUMS.map(n =>
                    `<th data-iter-num="${n}"${n === LAST_ITER ? ' class="iter-final-col"' : ''}>iter ${n}</th>`
                ).join('');

            const rows = MODELS.map(m => {
                const label = `<td class="row-label" data-model-name="${m.name}">
                    <span class="model-name">${m.label}</span>
                    <span class="model-badge badge-${m.badge}">${m.badge}</span>
                </td>`;

                if (m.badge === 'base') {
                    const id = cid('tbl', m.name, 'base');
                    return `<tr>${label}<td colspan="${ITER_NUMS.length}">
                        <div class="model-cell" id="cell-${id}" data-model-name="${m.name}" data-iter-num="base" data-cell-id="${id}">
                            <div class="haiku-response placeholder" id="res-${id}" data-cell-id="${id}">—</div>
                            <div class="cell-meta">
                                <span class="score-info" id="score-${id}"></span>
                                <span class="syllable-counts" id="syl-${id}"></span>
                                <span class="latency" id="lat-${id}"></span>
                            </div>
                        </div>
                    </td></tr>`;
                }

                const cells = ITER_NUMS.map(n => {
                    const id = cid('tbl', m.name, n);
                    const finalCls = n === LAST_ITER ? ' iter-final' : '';
                    return `<td><div class="model-cell${finalCls}" id="cell-${id}" data-model-name="${m.name}" data-iter-num="${n}" data-cell-id="${id}">
                        <div class="haiku-response placeholder" id="res-${id}" data-cell-id="${id}">—</div>
                        <div class="cell-meta">
                            <span class="score-info" id="score-${id}"></span>
                            <span class="syllable-counts" id="syl-${id}"></span>
                            <span class="latency" id="lat-${id}"></span>
                        </div>
                    </div></td>`;
                }).join('');

                return `<tr>${label}${cells}</tr>`;
            }).join('');

            view.innerHTML = `<table class="results-table">
                <thead><tr>${headerCells}</tr></thead>
                <tbody>${rows}</tbody>
            </table>`;
            bindDetailDiffHover();
        }

        // ── Shared query logic ──

        async function queryOneCell(elemPrefix, modelName, iterNum, prompt) {
            const id = cid(elemPrefix, modelName, iterNum);
            const t0 = Date.now();
            const cell = document.getElementById(`cell-${id}`);
            const res = document.getElementById(`res-${id}`);
            const score = document.getElementById(`score-${id}`);
            const syl = document.getElementById(`syl-${id}`);
            const lat = document.getElementById(`lat-${id}`);
            if (!cell) return;

            CELL_TEXTS.delete(id);
            cell.classList.add('loading');
            cell.classList.remove('error');
            res.innerHTML = '<span class="loading-spinner"></span> ...';
            res.classList.add('placeholder');
            score.textContent = '';
            syl.textContent = '';

            const includeVocab = document.getElementById('shill-modal').checked;

            try {
                const r = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({prompt, model_key: modelName, iter_num: iterNum, include_vocab: includeVocab})
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const d = await r.json();
                const elapsed = ((Date.now() - t0) / 1000).toFixed(2);

                res.classList.remove('placeholder');
                res.textContent = d.haiku;
                CELL_TEXTS.set(id, d.haiku);
                const pc = d.passed ? 'pass' : 'fail';
                const pl = d.passed ? '✓' : '✗';
                score.innerHTML = `<span class="${pc}">${pl} ${d.structure_score.toFixed(2)}</span>`;

                const targets = [5, 7, 5];
                syl.textContent = d.syllable_counts.map((c,i) => `${c}/${targets[i]}`).join(' ');
                lat.textContent = `${elapsed}s`;
            } catch (e) {
                cell.classList.add('error');
                CELL_TEXTS.delete(id);
                res.textContent = e.message;
                score.textContent = '';
                syl.textContent = '';
                lat.textContent = '';
            } finally {
                cell.classList.remove('loading');
            }
        }

        function showPromptFlash(text) {
            return new Promise(resolve => {
                const overlay = document.createElement('div');
                overlay.className = 'prompt-flash';
                overlay.innerHTML = `<div class="prompt-flash-text">${text}</div>`;
                document.body.appendChild(overlay);
                overlay.addEventListener('animationend', () => {
                    overlay.remove();
                    resolve();
                });
            });
        }

        function revealCardView() {
            const area = document.getElementById('results-area');
            area.classList.remove('hidden');
            const cards = document.querySelectorAll('#cards-view .card');
            cards.forEach(c => c.classList.add('card-enter'));
            requestAnimationFrame(() => {
                cards.forEach((c, i) => {
                    c.style.transitionDelay = `${i * 60}ms`;
                    c.classList.add('card-enter-active');
                    c.classList.remove('card-enter');
                });
                setTimeout(() => {
                    cards.forEach(c => { c.style.transitionDelay = ''; });
                }, cards.length * 60 + 400);
            });
        }

        async function generateHaikus() {
            const prompt = document.getElementById('prompt-input').value.trim();
            if (!prompt) return;
            lastPrompt = prompt;
            clearDetailDiff();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Generating...';
            window.haikuTree?.triggerGenerateSpin();

            if (firstGeneration) {
                document.body.classList.add('scrollable');
                document.querySelector('.container').classList.add('top-aligned');
                document.getElementById('tree-canvas').classList.add('shrunk');
                await showPromptFlash(prompt);
                revealCardView();
                firstGeneration = false;
            }

            const jobs = [];
            for (const m of MODELS) {
                const iter = m.badge === 'base' ? 'base' : LAST_ITER;
                jobs.push(queryOneCell('card', m.name, iter, prompt));
            }

            if (detailViewShown) {
                for (const m of MODELS) {
                    if (m.badge === 'base') {
                        jobs.push(queryOneCell('tbl', m.name, 'base', prompt));
                    } else {
                        for (const n of ITER_NUMS) {
                            jobs.push(queryOneCell('tbl', m.name, n, prompt));
                        }
                    }
                }
            }

            await Promise.all(jobs);
            btn.disabled = false;
            btn.textContent = 'Generate';
        }

        async function toggleDetailView() {
            const detail = document.getElementById('detail-view');
            const btn = document.getElementById('view-toggle-btn');

            if (!detailViewShown) {
                detailViewShown = true;
                detail.classList.remove('hidden');
                btn.textContent = 'hide checkpoints ↑';

                if (lastPrompt) {
                    const jobs = [];
                    for (const m of MODELS) {
                        if (m.badge === 'base') {
                            jobs.push(queryOneCell('tbl', m.name, 'base', lastPrompt));
                        } else {
                            for (const n of ITER_NUMS) {
                                jobs.push(queryOneCell('tbl', m.name, n, lastPrompt));
                            }
                        }
                    }
                    await Promise.all(jobs);
                }
            } else {
                clearDetailDiff();
                detailViewShown = false;
                detail.classList.add('hidden');
                btn.textContent = 'compare across checkpoints ↓';
            }
        }

        document.getElementById('prompt-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') generateHaikus();
        });

        loadConfig();
    </script>
</body>
</html>
