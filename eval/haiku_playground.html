<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen3-Haiku — RL-trained haiku generation on Modal</title>
    <meta name="description" content="Compare haiku generation across RL training checkpoints. A Qwen3-4B model fine-tuned with GRPO on Modal to write perfect 5-7-5 haikus.">
    <meta name="keywords" content="haiku, AI haiku generator, reinforcement learning, GRPO, Qwen3, Modal, LLM fine-tuning, poetry generation">
    <link rel="canonical" href="https://haiku.modal.dev/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Qwen3-Haiku — RL-trained haiku generation on Modal">
    <meta property="og:description" content="Compare haiku generation across RL training checkpoints. Qwen3-4B fine-tuned with GRPO to write perfect 5-7-5 haikus.">
    <meta property="og:url" content="https://haiku.modal.dev/">
    <meta property="og:image" content="https://haiku.modal.dev/assets/haiku_flower.png">
    <meta property="og:site_name" content="Qwen3-Haiku">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Qwen3-Haiku — RL-trained haiku generation on Modal">
    <meta name="twitter:description" content="Compare haiku generation across RL training checkpoints. Qwen3-4B fine-tuned with GRPO on Modal.">
    <meta name="twitter:image" content="https://haiku.modal.dev/assets/haiku_flower.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0f0a;
            --surface: #131a13;
            --surface2: #1a231a;
            --border: #2a3a2a;
            --border-light: #3a4f3a;
            --green: #4ade80;
            --green-dim: #22c55e;
            --green-muted: #16a34a;
            --green-glow: rgba(74, 222, 128, 0.15);
            --green-glow-strong: rgba(74, 222, 128, 0.25);
            --text: #e8efe8;
            --text-dim: #8a9b8a;
            --text-muted: #5a6b5a;
            --red: #f87171;
            --yellow: #fbbf24;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 5rem 2rem 2rem;
            overflow: hidden;
        }

        body.scrollable { overflow: auto; }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            min-height: calc(100vh - 7rem);
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: justify-content 0s;
        }

        .container.top-aligned {
            justify-content: flex-start;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: baseline;
            gap: 1rem;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 15, 10, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 5;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--green);
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: 'DM Mono', monospace;
        }

        .input-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .input-row {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        #prompt-input {
            flex: 1;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        #prompt-input::placeholder { color: var(--text-muted); }
        #prompt-input:focus { border-color: var(--green-dim); }

        #submit-btn {
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--green-muted);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.15s;
            white-space: nowrap;
        }

        #submit-btn:hover:not(:disabled) { background: var(--green-dim); }
        #submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.75rem;
        }

        .quick-prompt {
            padding: 0.35rem 0.75rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'DM Mono', monospace;
        }

        .quick-prompt:hover {
            background: var(--green-glow);
            border-color: var(--green-dim);
            color: var(--green);
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--green-dim);
            cursor: pointer;
        }

        .checkbox-row label {
            font-size: 0.85rem;
            cursor: pointer;
            user-select: none;
            color: var(--text-dim);
        }

        .vocab-hint {
            margin-top: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--green-glow);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 0.82rem;
            color: var(--text-dim);
            font-family: 'DM Mono', monospace;
        }

        .vocab-hint strong { color: var(--green); }
        .vocab-hint em { color: var(--text); font-style: normal; }
        .vocab-hint.hidden { display: none; }

        .results-area { width: 100%; }
        .results-area.hidden { display: none; }

        /* ── Card view (iter 50 only) ── */
        .cards-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.75rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.15rem;
            transition: border-color 0.2s, opacity 0.3s, transform 0.3s;
        }

        .card:hover { border-color: var(--border-light); }
        .card.loading { opacity: 0.7; }
        .card.error { border-color: var(--red); }

        .card.card-enter {
            opacity: 0;
            transform: translateY(12px);
        }

        .card.card-enter-active {
            opacity: 1;
            transform: translateY(0);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
        }

        .card-header .model-name { font-size: 0.85rem; }

        .card .haiku-response {
            font-size: 0.82rem;
            line-height: 1.7;
            min-height: 56px;
        }

        .card .haiku-response.placeholder {
            font-size: 0.75rem;
            min-height: 56px;
        }

        .card .cell-meta { margin-top: 0.4rem; }
        .card .score-info { font-size: 0.7rem; }
        .card .syllable-counts { font-size: 0.6rem; }
        .card .latency { font-size: 0.6rem; opacity: 0; }
        .card:hover .latency { opacity: 1; }

        .view-toggle-row {
            display: flex;
            justify-content: center;
            margin: 1.25rem 0;
        }

        .view-toggle-btn {
            padding: 0.45rem 1.1rem;
            font-size: 0.78rem;
            font-family: 'DM Mono', monospace;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s;
        }

        .view-toggle-btn:hover {
            background: var(--green-glow);
            border-color: var(--green-dim);
            color: var(--green);
        }

        /* ── Table (detail) view ── */
        .detail-view { overflow-x: auto; }
        .detail-view.hidden { display: none; }

        .results-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0.25rem;
        }

        .results-table th {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0.4rem 0.5rem;
            text-align: center;
            white-space: nowrap;
        }

        .results-table th.model-col {
            text-align: left;
            min-width: 110px;
        }

        .iter-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-muted);
            text-align: center;
        }

        .row-label {
            vertical-align: top;
            padding: 0.5rem;
            white-space: nowrap;
        }

        .row-label .model-name {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .row-label .model-badge {
            font-size: 0.55rem;
            padding: 0.12rem 0.4rem;
        }

        .prompt-flash {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }

        .prompt-flash-text {
            font-family: 'DM Mono', monospace;
            font-size: clamp(1.2rem, 3vw, 2.2rem);
            color: var(--green);
            text-align: center;
            max-width: 80vw;
            animation: promptZoomFade 1.2s ease-out forwards;
            text-shadow: 0 0 40px rgba(74, 222, 128, 0.4);
        }

        @keyframes promptZoomFade {
            0%   { opacity: 0; transform: scale(0.6); }
            30%  { opacity: 1; transform: scale(1); }
            70%  { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0; transform: scale(1.3); }
        }

        .model-cell {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.45rem 0.55rem;
            transition: border-color 0.2s, opacity 0.3s, transform 0.3s;
            position: relative;
            min-height: 60px;
        }

        .model-cell.card-enter {
            opacity: 0;
            transform: translateY(12px);
        }

        .model-cell.card-enter-active {
            opacity: 1;
            transform: translateY(0);
        }

        .model-cell:hover { border-color: var(--border-light); }
        .model-cell.loading { opacity: 0.7; }
        .model-cell.error { border-color: var(--red); }

        .model-cell.iter-final {
            border-color: var(--green-muted);
            background: rgba(74, 222, 128, 0.04);
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.08);
        }

        .model-name {
            font-weight: 600;
            color: var(--text);
            font-size: 0.8rem;
        }

        .model-badge {
            padding: 0.15rem 0.45rem;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 600;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .badge-base {
            background: var(--surface2);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .badge-trained {
            background: rgba(74, 222, 128, 0.1);
            color: var(--green);
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .badge-final {
            background: rgba(74, 222, 128, 0.2);
            color: var(--green);
            border: 1px solid var(--green-dim);
        }

        .haiku-response {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            line-height: 1.55;
            color: var(--text);
            white-space: pre-wrap;
            min-height: 36px;
        }

        .haiku-response.placeholder {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.6rem;
            min-height: 36px;
        }

        .loading-spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 1.5px solid var(--border);
            border-top: 1.5px solid var(--green);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 0.3rem;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .cell-meta {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-top: 0.25rem;
            font-family: 'DM Mono', monospace;
        }

        .score-info {
            font-size: 0.58rem;
            color: var(--text-dim);
        }

        .score-info .pass { color: var(--green); font-weight: 600; }
        .score-info .fail { color: var(--red); font-weight: 600; }

        .syllable-counts {
            font-size: 0.5rem;
            color: var(--text-muted);
        }

        .latency {
            font-size: 0.5rem;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.15s;
            margin-left: auto;
        }

        .model-cell:hover .latency { opacity: 1; }

        .results-table th.iter-final-col {
            color: var(--green);
        }

        #tree-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0.7;
            pointer-events: auto;
            touch-action: none;
            cursor: grab;
            z-index: 0;
            transition: opacity 1.4s ease;
        }

        #tree-canvas.shrunk {
            opacity: 0.35;
        }

        .container { position: relative; z-index: 1; }

        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: petalFloat linear forwards;
        }

        @keyframes petalFloat {
            0%   { opacity: 0; transform: translate(0, 0) rotate(0deg) scale(0.7); }
            10%  { opacity: 0.7; }
            90%  { opacity: 0.7; }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(1); }
        }

        .site-footer {
            position: fixed;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.7rem;
            font-family: 'DM Mono', monospace;
            color: var(--text-muted);
            opacity: 0.5;
            z-index: 2;
        }

        .site-footer a {
            color: var(--green-dim);
            text-decoration: none;
        }

        .site-footer a:hover { opacity: 0.8; }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            header { flex-direction: column; gap: 0.25rem; }
            .input-row { flex-direction: column; }
            #submit-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <canvas id="tree-canvas"></canvas>
    <header>
        <h1>haiku playground</h1>
        <p class="subtitle">compare haiku generation across training checkpoints</p>
    </header>
    <footer class="site-footer">fine-tuned with <a href="https://modal.com" target="_blank">Modal</a></footer>
    <div class="container">
        <div class="input-section">
            <div class="input-row">
                <input type="text" id="prompt-input" placeholder="Write me a haiku about..." value="Write me a haiku about the moon.">
                <button id="submit-btn" onclick="generateHaikus()">Generate</button>
            </div>
            <div class="quick-prompts" id="quick-prompts"></div>
            <div class="checkbox-row">
                <input type="checkbox" id="shill-modal" checked onchange="toggleVocabHint()">
                <label for="shill-modal">Shill Modal — include Modal vocabulary in system prompt</label>
            </div>
            <div class="vocab-hint" id="vocab-hint">
                <strong>bonus words:</strong> try to get the model to use: <em id="vocab-list">loading...</em>
            </div>
        </div>

        <div class="results-area hidden" id="results-area">
            <div class="cards-view" id="cards-view"></div>
            <div class="view-toggle-row" id="toggle-row">
                <button class="view-toggle-btn" id="view-toggle-btn" onclick="toggleDetailView()">compare across checkpoints ↓</button>
            </div>
            <div class="detail-view hidden" id="detail-view"></div>
        </div>
    </div>

    <script>
        let MODELS = [];
        let VOCABS = [];
        let ITER_NUMS = [];
        let LAST_ITER = '';
        let firstGeneration = true;
        let detailViewShown = false;
        let lastPrompt = '';

        async function loadConfig() {
            const [modelsResp, vocabsResp, itersResp] = await Promise.all([
                fetch('/api/models'),
                fetch('/api/vocabs'),
                fetch('/api/iter_nums'),
            ]);
            MODELS = await modelsResp.json();
            VOCABS = await vocabsResp.json();
            ITER_NUMS = await itersResp.json();
            LAST_ITER = ITER_NUMS[ITER_NUMS.length - 1];

            const qp = document.getElementById('quick-prompts');
            const prompts = [
                {l:'cat',p:'Write me a haiku about cat.'},
                {l:'ocean',p:'Write me a haiku about the ocean.'},
                {l:'cherry blossoms',p:'Write me a haiku about cherry blossoms.'},
                {l:'coding',p:'Write me a haiku about coding.'},
                {l:'Modal',p:'Write me a haiku about Modal.'},
                {l:'serverless',p:'Write me a haiku about serverless.'},
            ];
            qp.innerHTML = prompts.map(q =>
                `<span class="quick-prompt" onclick="setPrompt('${q.p}')">${q.l}</span>`
            ).join('');

            document.getElementById('vocab-list').textContent = VOCABS.join(', ');
            initCards();
            initDetailTable();
        }

        function toggleVocabHint() {
            const cb = document.getElementById('shill-modal');
            document.getElementById('vocab-hint').classList.toggle('hidden', !cb.checked);
        }

        function setPrompt(t) { document.getElementById('prompt-input').value = t; }

        function cid(prefix, modelName, iterNum) { return `${prefix}-${modelName}--${iterNum}`; }

        // ── Card view (iter 50 / base only) ──

        function initCards() {
            const view = document.getElementById('cards-view');
            view.innerHTML = MODELS.map(m => {
                const iter = m.badge === 'base' ? 'base' : LAST_ITER;
                const id = cid('card', m.name, iter);
                return `<div class="card" id="cell-${id}">
                    <div class="card-header">
                        <span class="model-name">${m.label}</span>
                        <span class="model-badge badge-${m.badge}">${m.badge}</span>
                    </div>
                    <div class="haiku-response placeholder" id="res-${id}">—</div>
                    <div class="cell-meta">
                        <span class="score-info" id="score-${id}"></span>
                        <span class="syllable-counts" id="syl-${id}"></span>
                        <span class="latency" id="lat-${id}"></span>
                    </div>
                </div>`;
            }).join('');
        }

        // ── Detail table (all iters) ──

        function initDetailTable() {
            const view = document.getElementById('detail-view');
            const headerCells = `<th class="model-col">model</th>` +
                ITER_NUMS.map(n =>
                    `<th${n === LAST_ITER ? ' class="iter-final-col"' : ''}>iter ${n}</th>`
                ).join('');

            const rows = MODELS.map(m => {
                const label = `<td class="row-label">
                    <span class="model-name">${m.label}</span>
                    <span class="model-badge badge-${m.badge}">${m.badge}</span>
                </td>`;

                if (m.badge === 'base') {
                    const id = cid('tbl', m.name, 'base');
                    return `<tr>${label}<td colspan="${ITER_NUMS.length}">
                        <div class="model-cell" id="cell-${id}">
                            <div class="haiku-response placeholder" id="res-${id}">—</div>
                            <div class="cell-meta">
                                <span class="score-info" id="score-${id}"></span>
                                <span class="syllable-counts" id="syl-${id}"></span>
                                <span class="latency" id="lat-${id}"></span>
                            </div>
                        </div>
                    </td></tr>`;
                }

                const cells = ITER_NUMS.map(n => {
                    const id = cid('tbl', m.name, n);
                    const finalCls = n === LAST_ITER ? ' iter-final' : '';
                    return `<td><div class="model-cell${finalCls}" id="cell-${id}">
                        <div class="haiku-response placeholder" id="res-${id}">—</div>
                        <div class="cell-meta">
                            <span class="score-info" id="score-${id}"></span>
                            <span class="syllable-counts" id="syl-${id}"></span>
                            <span class="latency" id="lat-${id}"></span>
                        </div>
                    </div></td>`;
                }).join('');

                return `<tr>${label}${cells}</tr>`;
            }).join('');

            view.innerHTML = `<table class="results-table">
                <thead><tr>${headerCells}</tr></thead>
                <tbody>${rows}</tbody>
            </table>`;
        }

        // ── Shared query logic ──

        async function queryOneCell(elemPrefix, modelName, iterNum, prompt) {
            const id = cid(elemPrefix, modelName, iterNum);
            const t0 = Date.now();
            const cell = document.getElementById(`cell-${id}`);
            const res = document.getElementById(`res-${id}`);
            const score = document.getElementById(`score-${id}`);
            const syl = document.getElementById(`syl-${id}`);
            const lat = document.getElementById(`lat-${id}`);
            if (!cell) return;

            cell.classList.add('loading');
            cell.classList.remove('error');
            res.innerHTML = '<span class="loading-spinner"></span> ...';
            res.classList.add('placeholder');
            score.textContent = '';
            syl.textContent = '';

            const includeVocab = document.getElementById('shill-modal').checked;

            try {
                const r = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({prompt, model_key: modelName, iter_num: iterNum, include_vocab: includeVocab})
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const d = await r.json();
                const elapsed = ((Date.now() - t0) / 1000).toFixed(2);

                res.classList.remove('placeholder');
                res.textContent = d.haiku;
                const pc = d.passed ? 'pass' : 'fail';
                const pl = d.passed ? '✓' : '✗';
                score.innerHTML = `<span class="${pc}">${pl} ${d.structure_score.toFixed(2)}</span>`;

                const targets = [5, 7, 5];
                syl.textContent = d.syllable_counts.map((c,i) => `${c}/${targets[i]}`).join(' ');
                lat.textContent = `${elapsed}s`;
            } catch (e) {
                cell.classList.add('error');
                res.textContent = e.message;
                score.textContent = '';
                syl.textContent = '';
                lat.textContent = '';
            } finally {
                cell.classList.remove('loading');
            }
        }

        function showPromptFlash(text) {
            return new Promise(resolve => {
                const overlay = document.createElement('div');
                overlay.className = 'prompt-flash';
                overlay.innerHTML = `<div class="prompt-flash-text">${text}</div>`;
                document.body.appendChild(overlay);
                overlay.addEventListener('animationend', () => {
                    overlay.remove();
                    resolve();
                });
            });
        }

        function revealCardView() {
            const area = document.getElementById('results-area');
            area.classList.remove('hidden');
            const cards = document.querySelectorAll('#cards-view .card');
            cards.forEach(c => c.classList.add('card-enter'));
            requestAnimationFrame(() => {
                cards.forEach((c, i) => {
                    c.style.transitionDelay = `${i * 60}ms`;
                    c.classList.add('card-enter-active');
                    c.classList.remove('card-enter');
                });
                setTimeout(() => {
                    cards.forEach(c => { c.style.transitionDelay = ''; });
                }, cards.length * 60 + 400);
            });
        }

        function triggerGenerateSpin() {
            if (!rotationState) return;
            const now = performance.now();
            rotationState.autoRotateEnabled = true;
            rotationState.boostUntil = now + 1800;
            rotationState.yawVelocity = Math.max(rotationState.yawVelocity, rotationState.spinBoost);
        }

        async function generateHaikus() {
            const prompt = document.getElementById('prompt-input').value.trim();
            if (!prompt) return;
            lastPrompt = prompt;
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Generating...';
            triggerGenerateSpin();

            if (firstGeneration) {
                document.body.classList.add('scrollable');
                document.querySelector('.container').classList.add('top-aligned');
                document.getElementById('tree-canvas').classList.add('shrunk');
                await showPromptFlash(prompt);
                revealCardView();
                firstGeneration = false;
            }

            const jobs = [];
            for (const m of MODELS) {
                const iter = m.badge === 'base' ? 'base' : LAST_ITER;
                jobs.push(queryOneCell('card', m.name, iter, prompt));
            }

            if (detailViewShown) {
                for (const m of MODELS) {
                    if (m.badge === 'base') {
                        jobs.push(queryOneCell('tbl', m.name, 'base', prompt));
                    } else {
                        for (const n of ITER_NUMS) {
                            jobs.push(queryOneCell('tbl', m.name, n, prompt));
                        }
                    }
                }
            }

            await Promise.all(jobs);
            btn.disabled = false;
            btn.textContent = 'Generate';
        }

        async function toggleDetailView() {
            const detail = document.getElementById('detail-view');
            const btn = document.getElementById('view-toggle-btn');

            if (!detailViewShown) {
                detailViewShown = true;
                detail.classList.remove('hidden');
                btn.textContent = 'hide checkpoints ↑';

                if (lastPrompt) {
                    const jobs = [];
                    for (const m of MODELS) {
                        if (m.badge === 'base') {
                            jobs.push(queryOneCell('tbl', m.name, 'base', lastPrompt));
                        } else {
                            for (const n of ITER_NUMS) {
                                jobs.push(queryOneCell('tbl', m.name, n, lastPrompt));
                            }
                        }
                    }
                    await Promise.all(jobs);
                }
            } else {
                detailViewShown = false;
                detail.classList.add('hidden');
                btn.textContent = 'compare across checkpoints ↓';
            }
        }

        document.getElementById('prompt-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') generateHaikus();
        });

        loadConfig();

        // ── Isometric 3D Tree ──
        const treeCanvas = document.getElementById('tree-canvas');
        const treeCtx = treeCanvas.getContext('2d');
        const branchTips = [];
        const TREE_SCALE_INITIAL = 2;
        const TREE_SCALE_SHRUNK = 1;
        let treeRenderScale = TREE_SCALE_INITIAL;

        const COS30 = Math.cos(Math.PI / 6);
        const SIN30 = Math.sin(Math.PI / 6);

        function isoProject(x, y, z) {
            return {
                sx: (x - y) * COS30,
                sy: (x + y) * SIN30 - z
            };
        }

        const rotationState = {
            yaw: 0,
            pitch: 0.35,
            yawVelocity: 0,
            pitchVelocity: 0,
            dragging: false,
            activePointerId: null,
            lastX: 0,
            lastY: 0,
            lastT: 0,
            lastFrameTs: 0,
            autoRotateEnabled: false,
            boostUntil: 0,
            frictionPer60: 0.93,
            maxPitch: 1.0,
            pixelsToRadians: 0.0065,
            spinBoost: 0.03,
            cruiseYawSpeed: 0.0026,
        };

        function rotateZ(point, angle) {
            const c = Math.cos(angle);
            const s = Math.sin(angle);
            return {
                x: point.x * c - point.y * s,
                y: point.x * s + point.y * c,
                z: point.z,
            };
        }

        function rotateX(point, angle) {
            const c = Math.cos(angle);
            const s = Math.sin(angle);
            return {
                x: point.x,
                y: point.y * c - point.z * s,
                z: point.y * s + point.z * c,
            };
        }

        function worldToView(point) {
            const zRot = rotateZ(point, rotationState.yaw);
            return rotateX(zRot, rotationState.pitch);
        }

        function projectWorld(point) {
            const v = worldToView(point);
            return isoProject(v.x, v.y, v.z);
        }

        const BLOSSOM_COLORS = ['#a6dfbf', '#bfe6c2', '#d9e4ba', '#f2d3c6', '#ffbfd8'];
        const TRUNK_TOP = ['#6f8f52','#5f7c45','#415533'];
        const TRUNK_BASE = ['#4a6633','#3d5529','#2e4020'];
        const TIP_CLR = ['#90b87a','#7da066','#6a8855'];

        let treeBranches = [];
        let treeNodes = [];
        let treeGenerated = false;
        let growthStart = 0;
        const MAX_DEPTH = 7;

        function lerpHex(a, b, t) {
            const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
            const r = Math.round(((ah>>16)&0xff) + (((bh>>16)&0xff) - ((ah>>16)&0xff)) * t);
            const g = Math.round(((ah>>8)&0xff) + (((bh>>8)&0xff) - ((ah>>8)&0xff)) * t);
            const bl = Math.round((ah&0xff) + ((bh&0xff) - (ah&0xff)) * t);
            return '#' + ((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
        }

        function faceColors(depth) {
            const t = Math.min(1, depth / MAX_DEPTH);
            return [
                lerpHex(TRUNK_BASE[0], TIP_CLR[0], t),
                lerpHex(TRUNK_BASE[1], TIP_CLR[1], t),
                lerpHex(TRUNK_BASE[2], TIP_CLR[2], t),
            ];
        }

        function thickness(depth) {
            return Math.max(1.0, 8 * Math.pow(0.62, depth));
        }

        function segLength(depth) {
            if (depth === 0) return 160;
            if (depth === 1) return 110;
            if (depth === 2) return 90;
            return Math.max(20, 62 - depth * 5);
        }

        function makeDir(yaw, tilt) {
            const h = Math.sin(tilt), v = Math.cos(tilt);
            return { x: Math.cos(yaw) * h, y: Math.sin(yaw) * h, z: v };
        }

        function addSeg(depth, start, dir, len, thick) {
            const jit = 1 + (Math.random() - 0.5) * 0.12;
            const L = len * jit;
            const end = { x: start.x + dir.x * L, y: start.y + dir.y * L, z: start.z + dir.z * L };
            treeBranches.push({
                start: { ...start }, end: { ...end }, depth,
                thickness: thick,
                faceColors: faceColors(depth),
                swayPhase: Math.random() * Math.PI * 2,
                swaySpeed: 0.25 + Math.random() * 0.35,
            });
            treeNodes.push({ pos: { ...end }, depth, glowPhase: Math.random() * Math.PI * 2 });
            return end;
        }

        function growCanopy(depth, pos, yaw, maxD, vigor) {
            if (depth > maxD) { branchTips.push({ ...pos }); return; }
            const lenScale = 0.7 + vigor * 0.6 + (Math.random() - 0.5) * 0.3;
            const len = segLength(depth) * lenScale;
            const thick = thickness(depth) * (0.8 + vigor * 0.4);
            const tilt = 0.42 + depth * 0.09 + (Math.random() - 0.5) * 0.25;
            const dir = makeDir(yaw + (Math.random() - 0.5) * 0.15, tilt);
            const end = addSeg(depth, pos, dir, len, thick);

            if (depth >= maxD) { branchTips.push({ ...end }); return; }

            if (Math.random() < 0.08 && depth > 3) {
                branchTips.push({ ...end });
                return;
            }

            const nKids = vigor > 0.6 ? 3 : (Math.random() < 0.45 ? 3 : 2);
            const spread = 0.95 + depth * 0.16 + (Math.random() - 0.5) * 0.24;
            for (let i = 0; i < nKids; i++) {
                const frac = nKids === 1 ? 0 : (i / (nKids - 1) - 0.5);
                const kidYaw = yaw + frac * spread + (Math.random() - 0.5) * 0.4;
                const kidVigor = vigor * (0.55 + Math.random() * 0.45);
                growCanopy(depth + 1, end, kidYaw, maxD, kidVigor);
            }
        }

        function buildTree() {
            treeBranches = [];
            treeNodes = [];
            branchTips.length = 0;

            const p0 = { x: 0, y: 0, z: 0 };
            const trunkLean = { x: 0.03, y: -0.02, z: 0.999 };
            const p1 = addSeg(0, p0, { x: 0, y: 0, z: 1 }, segLength(0), thickness(0));
            const p2 = addSeg(1, p1, trunkLean, segLength(1), thickness(1));

            const mains = [
                { yaw: 0.4, tilt: 0.66, vigor: 1.0, lenMul: 1.12 },
                { yaw: 1.8, tilt: 0.58, vigor: 0.85, lenMul: 1.02 },
                { yaw: 3.3, tilt: 0.70, vigor: 0.7, lenMul: 0.96 },
                { yaw: 5.0, tilt: 0.78, vigor: 0.6, lenMul: 0.88 },
            ];
            for (const m of mains) {
                const yaw = m.yaw + (Math.random() - 0.5) * 0.5;
                const tilt = m.tilt + (Math.random() - 0.5) * 0.15;
                const dir = makeDir(yaw, tilt);
                const len = segLength(2) * m.lenMul * (0.85 + Math.random() * 0.3);
                const bs = addSeg(2, p2, dir, len, thickness(2) * (0.7 + m.vigor * 0.3));
                growCanopy(3, bs, yaw, MAX_DEPTH, m.vigor);
            }

            const topYaw = 2.0 + (Math.random() - 0.5) * 0.6;
            const topDir = makeDir(topYaw, 0.30 + Math.random() * 0.12);
            const topS = addSeg(2, p2, topDir, segLength(2) * 0.9, thickness(2) * 0.9);
            growCanopy(3, topS, topYaw, MAX_DEPTH, 0.9);

            const lowYaw = 4.2 + (Math.random() - 0.5) * 0.8;
            const lowDir = makeDir(lowYaw, 0.7 + Math.random() * 0.2);
            const lowS = addSeg(2, p1, lowDir, segLength(2) * 0.6, thickness(2) * 0.7);
            growCanopy(3, lowS, lowYaw, MAX_DEPTH - 1, 0.5);

            const low2Yaw = 1.0 + (Math.random() - 0.5) * 0.6;
            const low2Dir = makeDir(low2Yaw, 0.55 + Math.random() * 0.2);
            const low2S = addSeg(2, p1, low2Dir, segLength(2) * 0.5, thickness(2) * 0.65);
            growCanopy(3, low2S, low2Yaw, MAX_DEPTH - 2, 0.35);

            treeBranches.sort((a, b) => {
                const dA = (a.start.x + a.start.y + a.end.x + a.end.y) * 0.25 - (a.start.z + a.end.z) * 0.4;
                const dB = (b.start.x + b.start.y + b.end.x + b.end.y) * 0.25 - (b.start.z + b.end.z) * 0.4;
                return dA - dB;
            });
            treeGenerated = true;
            growthStart = performance.now();
        }

        function getAnimatedSegment(branch, t, swayOffsets) {
            const growT = Math.min(1, Math.max(0, (t - branch.depth * 280) / 500));
            if (growT <= 0) return null;

            const start = branch.start;
            let end = {
                x: start.x + (branch.end.x - start.x) * growT,
                y: start.y + (branch.end.y - start.y) * growT,
                z: start.z + (branch.end.z - start.z) * growT
            };

            if (branch.depth >= MAX_DEPTH - 3 && swayOffsets) {
                const sway = Math.sin(swayOffsets.time * branch.swaySpeed + branch.swayPhase) * 0.025 * (branch.depth - (MAX_DEPTH - 4));
                end = { x: end.x + sway * 8, y: end.y + sway * 6, z: end.z };
            }

            return { start, end, growT };
        }

        function rotatedDepthKey(segment) {
            const mid = {
                x: (segment.start.x + segment.end.x) * 0.5,
                y: (segment.start.y + segment.end.y) * 0.5,
                z: (segment.start.z + segment.end.z) * 0.5,
            };
            const v = worldToView(mid);
            return (v.x + v.y) * 0.5 - v.z * 0.8;
        }

        function drawPrism(ctx, branch, segment) {
            const start = segment.start;
            const end = segment.end;
            const wBot = branch.thickness * 0.5;
            const wTop = wBot * 0.72;

            const bOff = [{x:-wBot,y:-wBot},{x:wBot,y:-wBot},{x:wBot,y:wBot},{x:-wBot,y:wBot}];
            const tOff = [{x:-wTop,y:-wTop},{x:wTop,y:-wTop},{x:wTop,y:wTop},{x:-wTop,y:wTop}];

            const bV = bOff.map(o => projectWorld({ x: start.x + o.x, y: start.y + o.y, z: start.z }));
            const tV = tOff.map(o => projectWorld({ x: end.x + o.x, y: end.y + o.y, z: end.z }));

            ctx.beginPath();
            ctx.moveTo(tV[0].sx, tV[0].sy);
            for (let i = 1; i < 4; i++) ctx.lineTo(tV[i].sx, tV[i].sy);
            ctx.closePath();
            ctx.fillStyle = branch.faceColors[0];
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(tV[1].sx, tV[1].sy);
            ctx.lineTo(tV[2].sx, tV[2].sy);
            ctx.lineTo(bV[2].sx, bV[2].sy);
            ctx.lineTo(bV[1].sx, bV[1].sy);
            ctx.closePath();
            ctx.fillStyle = branch.faceColors[1];
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(tV[0].sx, tV[0].sy);
            ctx.lineTo(tV[3].sx, tV[3].sy);
            ctx.lineTo(bV[3].sx, bV[3].sy);
            ctx.lineTo(bV[0].sx, bV[0].sy);
            ctx.closePath();
            ctx.fillStyle = branch.faceColors[2];
            ctx.fill();
        }

        function drawLeaf(ctx, pos) {
            const p = projectWorld(pos);
            const seed = Math.abs(Math.floor(pos.x * 1.7 + pos.y * 2.3 + pos.z * 3.1));
            const petalColor = BLOSSOM_COLORS[seed % BLOSSOM_COLORS.length];
            const r = 4.5;
            const offsets = [
                { x: 0, y: -r * 0.85 },
                { x: r * 0.85, y: 0 },
                { x: 0, y: r * 0.85 },
                { x: -r * 0.85, y: 0 },
                { x: r * 0.5, y: -r * 0.5 },
                { x: -r * 0.5, y: r * 0.5 },
            ];
            ctx.fillStyle = petalColor;
            for (const o of offsets) {
                ctx.beginPath();
                ctx.arc(p.sx + o.x, p.sy + o.y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.beginPath();
            ctx.arc(p.sx, p.sy, 2.0, 0, Math.PI * 2);
            ctx.fillStyle = '#fff5b8';
            ctx.fill();
        }

        function drawNode(ctx, node, t) {
            const growT = Math.min(1, Math.max(0, (t - node.depth * 300) / 600));
            if (growT < 1) return;

            const glow = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(performance.now() * 0.002 + node.glowPhase));
            const p = projectWorld(node.pos);
            const r = node.depth >= MAX_DEPTH - 1 ? 2 : 3;

            ctx.beginPath();
            ctx.arc(p.sx, p.sy, r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 199, 221, ${glow * 0.6})`;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(p.sx, p.sy, r + 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 199, 221, ${glow * 0.15})`;
            ctx.fill();
        }

        let energyDots = [];
        let lastEnergySpawn = 0;
        function updateEnergyDots(t, dt60) {
            if (t > 2200 && t - lastEnergySpawn > 4000 && treeBranches.length > 0) {
                lastEnergySpawn = t;
                const pathLen = 3 + Math.floor(Math.random() * (MAX_DEPTH - 2));
                let branches = [];
                let current = treeBranches.filter(b => b.depth === 0);
                if (current.length === 0) return;
                let picked = current[Math.random() * current.length | 0];
                branches.push(picked);
                for (let d = 1; d < pathLen; d++) {
                    const children = treeBranches.filter(b =>
                        b.depth === d &&
                        Math.abs(b.start.x - picked.end.x) < 1 &&
                        Math.abs(b.start.y - picked.end.y) < 1 &&
                        Math.abs(b.start.z - picked.end.z) < 1
                    );
                    if (children.length === 0) break;
                    picked = children[Math.random() * children.length | 0];
                    branches.push(picked);
                }
                energyDots.push({ branches, progress: 0, speed: 0.0015 + Math.random() * 0.001 });
            }

            energyDots = energyDots.filter(dot => {
                dot.progress += dot.speed * 16 * dt60;
                return dot.progress < dot.branches.length;
            });
        }

        function drawEnergyDots(ctx) {
            for (const dot of energyDots) {
                const idx = Math.floor(dot.progress);
                if (idx >= dot.branches.length) continue;
                const frac = dot.progress - idx;
                const b = dot.branches[idx];
                const pos = {
                    x: b.start.x + (b.end.x - b.start.x) * frac,
                    y: b.start.y + (b.end.y - b.start.y) * frac,
                    z: b.start.z + (b.end.z - b.start.z) * frac,
                };
                const p = projectWorld(pos);

                ctx.beginPath();
                ctx.arc(p.sx, p.sy, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = '#ffe8f3';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(p.sx, p.sy, 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 182, 213, 0.25)';
                ctx.fill();
            }
        }

        function resizeTreeCanvas() {
            const rect = treeCanvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            treeCanvas.width = rect.width * dpr;
            treeCanvas.height = rect.height * dpr;
            treeCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function setupTreeInteraction() {
            function releasePointer(e) {
                if (rotationState.activePointerId !== e.pointerId) return;
                rotationState.dragging = false;
                if (treeCanvas.hasPointerCapture(e.pointerId)) {
                    treeCanvas.releasePointerCapture(e.pointerId);
                }
                rotationState.activePointerId = null;
                treeCanvas.style.cursor = 'grab';
            }

            treeCanvas.addEventListener('pointerdown', e => {
                if (rotationState.activePointerId !== null) return;
                rotationState.activePointerId = e.pointerId;
                rotationState.dragging = true;
                rotationState.lastX = e.clientX;
                rotationState.lastY = e.clientY;
                rotationState.lastT = performance.now();
                treeCanvas.setPointerCapture(e.pointerId);
                treeCanvas.style.cursor = 'grabbing';
            });

            treeCanvas.addEventListener('pointermove', e => {
                if (!rotationState.dragging || rotationState.activePointerId !== e.pointerId) return;
                const now = performance.now();
                const dtMs = Math.max(1, now - rotationState.lastT);
                const dt60 = dtMs / 16.6667;
                const dx = e.clientX - rotationState.lastX;
                const dy = e.clientY - rotationState.lastY;

                const yawDelta = dx * rotationState.pixelsToRadians;
                const pitchDelta = dy * rotationState.pixelsToRadians;
                rotationState.yaw += yawDelta;
                rotationState.pitch += pitchDelta;
                rotationState.pitch = Math.max(-rotationState.maxPitch, Math.min(rotationState.maxPitch, rotationState.pitch));
                rotationState.yawVelocity = yawDelta / dt60;
                rotationState.pitchVelocity = pitchDelta / dt60;
                rotationState.lastX = e.clientX;
                rotationState.lastY = e.clientY;
                rotationState.lastT = now;
            });

            treeCanvas.addEventListener('pointerup', releasePointer);
            treeCanvas.addEventListener('pointercancel', releasePointer);
            treeCanvas.addEventListener('lostpointercapture', releasePointer);
        }

        function animateTree(now = performance.now()) {
            if (!treeGenerated) { requestAnimationFrame(animateTree); return; }

            const rect = treeCanvas.getBoundingClientRect();
            if (treeCanvas.width !== rect.width * (window.devicePixelRatio || 1)) {
                resizeTreeCanvas();
            }

            if (!rotationState.lastFrameTs) rotationState.lastFrameTs = now;
            const dtMs = Math.max(1, now - rotationState.lastFrameTs);
            const dt60 = Math.min(4, dtMs / 16.6667);
            rotationState.lastFrameTs = now;
            const targetScale = treeCanvas.classList.contains('shrunk') ? TREE_SCALE_SHRUNK : TREE_SCALE_INITIAL;
            treeRenderScale += (targetScale - treeRenderScale) * Math.min(1, 0.12 * dt60);

            if (!rotationState.dragging) {
                rotationState.yaw += rotationState.yawVelocity * dt60;
                rotationState.pitch += rotationState.pitchVelocity * dt60;

                if (rotationState.autoRotateEnabled) {
                    if (now < rotationState.boostUntil) {
                        rotationState.yawVelocity += 0.0013 * dt60;
                    } else if (Math.abs(rotationState.yawVelocity) < 0.0009) {
                        rotationState.yaw += rotationState.cruiseYawSpeed * dt60;
                    }
                }

                const damp = Math.pow(rotationState.frictionPer60, dt60);
                rotationState.yawVelocity *= damp;
                rotationState.pitchVelocity *= damp;
                rotationState.pitch = Math.max(-rotationState.maxPitch, Math.min(rotationState.maxPitch, rotationState.pitch));
            }

            const w = rect.width;
            const h = rect.height;
            treeCtx.clearRect(0, 0, w, h);
            treeCtx.save();
            treeCtx.translate(w / 2, h - 20);
            treeCtx.scale(treeRenderScale, treeRenderScale);

            const t = now - growthStart;
            const swayOffsets = { time: now * 0.001 };

            const drawQueue = [];
            for (const branch of treeBranches) {
                const segment = getAnimatedSegment(branch, t, swayOffsets);
                if (!segment) continue;
                drawQueue.push({ branch, segment, depthKey: rotatedDepthKey(segment) });
            }
            drawQueue.sort((a, b) => a.depthKey - b.depthKey);

            for (const item of drawQueue) {
                drawPrism(treeCtx, item.branch, item.segment);
            }

            for (const tip of branchTips) {
                const tipGrowT = Math.min(1, Math.max(0, (t - MAX_DEPTH * 300) / 600));
                if (tipGrowT >= 1) drawLeaf(treeCtx, tip);
            }

            for (const node of treeNodes) {
                drawNode(treeCtx, node, t);
            }

            updateEnergyDots(t, dt60);
            drawEnergyDots(treeCtx);

            treeCtx.restore();
            requestAnimationFrame(animateTree);
        }

        buildTree();
        resizeTreeCanvas();
        setupTreeInteraction();
        window.addEventListener('resize', resizeTreeCanvas);
        requestAnimationFrame(animateTree);

        // ── Floating petals ──
        const PETAL_PATHS = [
            'M8 0C8 0 10 6 8 10C6 14 2 16 0 16C0 16 2 10 4 6C6 2 8 0 8 0Z',
            'M6 0C6 0 9 4 9 8C9 12 6 16 3 16C0 16 0 12 2 8C4 4 6 0 6 0Z',
            'M5 0C5 0 10 3 10 8C10 13 6 16 3 16C0 16 1 11 3 7C5 3 5 0 5 0Z',
        ];
        const BLOSSOM_PETALS = ['#a6dfbf','#bfe6c2','#d9e4ba','#f2d3c6','#ffbfd8','#ffacd2'];

        function tipToScreen(tip) {
            const canvasRect = treeCanvas.getBoundingClientRect();
            const p = projectWorld(tip);
            const originX = canvasRect.left + canvasRect.width / 2;
            const originY = canvasRect.top + canvasRect.height;
            return {
                x: originX + p.sx * treeRenderScale,
                y: originY + (p.sy - 20) * treeRenderScale
            };
        }

        function spawnPetal() {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', '0 0 16 16');
            svg.classList.add('petal');

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', PETAL_PATHS[Math.random() * PETAL_PATHS.length | 0]);
            path.setAttribute('fill', BLOSSOM_PETALS[Math.random() * BLOSSOM_PETALS.length | 0]);
            svg.appendChild(path);

            const size = 22 + Math.random() * 20;
            svg.style.width = size + 'px';
            svg.style.height = size + 'px';

            const fromTip = branchTips.length > 0 && Math.random() < 0.6;
            let sideBias = 0;
            if (fromTip) {
                const tip = branchTips[Math.random() * branchTips.length | 0];
                const screen = tipToScreen(tip);
                svg.style.left = screen.x + 'px';
                svg.style.top = screen.y + 'px';
                sideBias = (screen.x - window.innerWidth * 0.5) / Math.max(1, window.innerWidth * 0.5);
            } else {
                svg.style.left = (Math.random() * 100) + 'vw';
                svg.style.top = (Math.random() * 100) + 'vh';
            }

            const dx = fromTip
                ? sideBias * (90 + Math.random() * 160) + (Math.random() - 0.5) * 70
                : (Math.random() - 0.5) * 300;
            const dy = fromTip
                ? -170 - Math.random() * 260
                : -150 - Math.random() * 250;
            const rot = (Math.random() - 0.5) * 720;
            const dur = 6 + Math.random() * 8;

            svg.style.setProperty('--dx', dx + 'px');
            svg.style.setProperty('--dy', dy + 'px');
            svg.style.setProperty('--rot', rot + 'deg');
            svg.style.animationDuration = dur + 's';

            document.body.appendChild(svg);
            svg.addEventListener('animationend', () => svg.remove());
        }

        setInterval(spawnPetal, 350);
        for (let i = 0; i < 20; i++) setTimeout(spawnPetal, i * 150);
    </script>
</body>
